services:
  - type: web
    name: seasonality-cot
    env: python
    plan: free
    buildCommand: /opt/render/project/python/bin/pip install -r requirements.txt
    startCommand: /opt/render/project/python/bin/python -m streamlit run dashboard.py --server.port $PORT --server.address 0.0.0.0
    autoDeploy: true
